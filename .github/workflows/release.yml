name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/mineplayer-release.jks"

      - name: Build signed release APK
        env:
          MINEPLAYER_KEYSTORE_PATH: ${{ runner.temp }}/mineplayer-release.jks
          MINEPLAYER_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MINEPLAYER_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MINEPLAYER_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        id: apk
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="MinePlayer-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.name }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.name }}
          generate_release_notes: true
